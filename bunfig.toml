# Bun configuration for HAQA monorepo
[install]
# Use production mode by default
production = false
# Auto install peer dependencies
peer = true
# Use exact versions
exact = false
# Hoist dependencies to root (like pnpm)
hoist = true
# Copy packages instead of junctions — more reliable on Windows
linker = "hoisted"

[install.scopes]
# Configure scoped packages if needed

